# Configurações do Banco de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/Library?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=library_user
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações do Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Nome do arquivo que será criado na raiz do seu projeto
logging.file.name=logs/aplicacao_fgv.log

# Define o nível de detalhe (INFO mostra o fluxo, ERROR mostra as quebras)
logging.level.root=INFO
logging.level.AppService=DEBUG
logging.level.Controllers=DEBUG

# Padrão simplificado: Data - Nível - Classe: Mensagem
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{20} : %msg%n

# Desativa o log excessivo do Spring e Hibernate no arquivo
logging.level.org.springframework=ERROR
logging.level.org.hibernate=ERROR
